data:
  skab_path: "data/raw/skab"
  batadal_path: "data/raw/batadal"
  processed_path: "data/processed"

preprocessing:
  scaler: "standard"          # standard veya minmax
  pca_components_dl: null     # DL modelleri: null = varyansın %95'ini koru
  pca_components_automata: 1  # Otomata: PDF gereği tek boyut (PC1)
  random_seed: 42

automata:
  window_size: 4
  alphabet_size: 3
  paa_segments: 4
  anomaly_threshold: 1.0e-5

experiment:
  seeds: [42, 123, 2026, 7, 999]
  noise_std: 0.1
  batadal_split: [0.6, 0.2, 0.2]
  unseen_alphabet_size: 6   # Unseen senaryo için genişletilmiş alfabe

training:
  epochs: 50
  batch_size: 32
  patience: 5
  learning_rate: 0.001

parameter_sweep:
  window_sizes: [3, 4, 5, 6]
  alphabet_sizes: [3, 4, 5, 6]

logging:
  log_dir: "experiments/logs"
  log_format: "json"
